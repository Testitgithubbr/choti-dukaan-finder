<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<style>

body{

margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:url("bg2.png");
background-size:cover;
background-position:center;

font-family:Poppins;

}

/* Glass Container */

.glass-container{

width:350px;
padding:40px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);

border-radius:20px;

box-shadow:0 10px 40px rgba(0,0,0,0.2);

text-align:center;

}

/* Logo */

.logo{

width:80px;
margin-bottom:10px;

}

h2{

color:white;

}

/* Inputs */

input{

width:100%;
padding:12px;
margin:10px 0;

border:none;
border-radius:8px;

}

/* Password box */

.password-box{

position:relative;

}

.password-box span{

position:absolute;
right:10px;
top:15px;
cursor:pointer;

}

/* Button */

button{

width:100%;
padding:12px;

background:#0072ff;
color:white;

border:none;
border-radius:8px;

margin-top:10px;
cursor:pointer;

}

/* Links */

p{

color:white;
font-size:14px;

}

a{

color:#00e5ff;
text-decoration:none;

}

</style>
</head>

<body>

<div class="glass-container">

<img src="logo.png" class="logo">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Email or Phone Number">

<div class="password-box">

<input type="password" id="signupPassword" placeholder="Create Password">

<span onclick="togglePassword()">👁</span>

</div>

<button>Sign Up</button>

<p>
Already registered?
<a href="login.html">Login</a>
</p>

</div>

<script>

function togglePassword(){

var x = document.getElementById("signupPassword");

if(x.type === "password"){
x.type = "text";
}
else{
x.type = "password";
}

}

</script>

</body>
</html>
